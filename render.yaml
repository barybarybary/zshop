# Render Blueprint - 一键部署
services:
  # Web 服务
  - type: web
    name: zshop
    runtime: node
    buildCommand: npm install && npx prisma generate && npx prisma db push && npx next build
    startCommand: npx next start --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: zshop-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: AUTH_URL
        value: https://zshop.onrender.com
      - key: NEXT_PUBLIC_APP_URL
        value: https://zshop.onrender.com
      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: NODE_VERSION
        value: 20.x

  # PostgreSQL 数据库
  - type: postgres
    name: zshop-db
    plan: free
